<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morning Greetings</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dawn:   #f4a261;
      --gold:   #e9c46a;
      --sky:    #264653;
      --cream:  #fdf6ec;
      --soft:   #f8ede3;
      --ink:    #2c1810;
      --muted:  #8a6a56;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      overflow: hidden;
    }

    .bg-rays {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 110%, #f9dfc0 0%, transparent 70%),
                  radial-gradient(ellipse 60% 40% at 80% 10%, #fde8c8 0%, transparent 60%),
                  var(--cream);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(520px, 92vw);
      padding: 3.5rem 3rem 2.8rem;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(233,196,106,0.35);
      border-radius: 2px;
      box-shadow: 0 2px 40px rgba(200,120,60,0.08);
      backdrop-filter: blur(8px);
      text-align: center;
    }

    .sun-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.6rem;
      animation: spin 18s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .time-label {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    .greeting {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.7rem, 5vw, 2.4rem);
      font-weight: 600;
      color: var(--ink);
      line-height: 1.25;
      margin-bottom: 1.4rem;
      min-height: 3em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message {
      font-size: 1rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.75;
      letter-spacing: 0.01em;
      min-height: 4em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--dawn), transparent);
      margin: 1.8rem auto;
    }

    .clock {
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 2rem;
    }

    .btn-next {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.6rem 1.5rem;
      border: 1px solid rgba(233,196,106,0.6);
      border-radius: 1px;
      background: transparent;
      font-family: 'Lato', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .btn-next:hover {
      background: var(--soft);
      border-color: var(--dawn);
      color: var(--ink);
    }

    .btn-next svg { width: 14px; height: 14px; }

    .fade { animation: fadeUp 0.55s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="bg-rays" aria-hidden="true"></div>

<main class="card" role="main">

  <svg class="sun-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="28" cy="28" r="12" fill="#e9c46a" opacity="0.9"/>
    <g stroke="#f4a261" stroke-width="2" stroke-linecap="round">
      <line x1="28" y1="4"  x2="28" y2="10"/>
      <line x1="28" y1="46" x2="28" y2="52"/>
      <line x1="4"  y1="28" x2="10" y2="28"/>
      <line x1="46" y1="28" x2="52" y2="28"/>
      <line x1="10.6" y1="10.6" x2="14.9" y2="14.9"/>
      <line x1="41.1" y1="41.1" x2="45.4" y2="45.4"/>
      <line x1="45.4" y1="10.6" x2="41.1" y2="14.9"/>
      <line x1="14.9" y1="41.1" x2="10.6" y2="45.4"/>
    </g>
  </svg>

  <p class="time-label" id="period-label">Good Morning</p>

  <div class="clock" id="clock">—</div>

  <div class="greeting fade" id="greeting-text"></div>

  <div class="divider"></div>

  <div class="message fade" id="message-text"></div>

  <div class="divider"></div>

  <button class="btn-next" id="next-btn" aria-label="Next greeting">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M2 7h10M8 3l4 4-4 4"/>
    </svg>
    Next
  </button>

</main>

<script>
  const data = {
    morning: {
      label: "Good Morning",
      greetings: [
        { text: "Rise and greet the golden hour.", msg: "The early light belongs to those who dare to begin. Today is full of open doors." },
        { text: "A brand new morning, a blank new page.", msg: "What will you write on it? Whatever it is, make it yours." },
        { text: "Let the sun be your alarm clock.", msg: "It rose faithfully for you. That alone is worth a smile." },
        { text: "Morning is nature's reset button.", msg: "Yesterday's weight stays behind. Step into this day lightly." },
        { text: "Breathe in the quiet of the early world.", msg: "Before the noise begins, this moment is completely yours." },
      ]
    },
    afternoon: {
      label: "Good Afternoon",
      greetings: [
        { text: "The day is halfway told.", msg: "The best chapters are often in the middle. Keep reading." },
        { text: "Afternoon light has a different warmth.", msg: "Softer, longer — like wisdom. You're doing just fine." },
        { text: "Mid-day check-in: you're still here.", msg: "That's worth noting. Now, what's one thing worth finishing today?" },
        { text: "The sun is generous with its afternoon hours.", msg: "Take a breath between the doing. Pace is a kind of discipline." },
        { text: "Hello, midday wanderer.", msg: "Even the busiest day holds small pockets of wonder. Look for them." },
      ]
    },
    evening: {
      label: "Good Evening",
      greetings: [
        { text: "Evening arrives like a deep exhale.", msg: "Let the day go gently. You gave what you could." },
        { text: "The sky trades blue for amber.", msg: "A quiet signal that rest is not only allowed — it's earned." },
        { text: "Twilight is the world's way of winding down.", msg: "You are allowed to do the same. Slowly, kindly." },
        { text: "The stars are beginning to clock in.", msg: "Your shift is nearly done. Well done today." },
        { text: "Good evening, weary and wonderful soul.", msg: "Whatever today held, you were in it — and that matters." },
      ]
    },
    night: {
      label: "Good Night",
      greetings: [
        { text: "The night belongs to the dreamers.", msg: "Close your eyes to open wider ones. Sleep well." },
        { text: "Stars don't ask to shine. Neither should you.", msg: "Tomorrow, shine a little more." },
        { text: "Let the darkness hold you gently.", msg: "Night is not absence of light — it's preparation for it." },
        { text: "Rest is not retreat. It's renewal.", msg: "The world will still be there in the morning. So will you." },
        { text: "The quietest hours are the kindest.", msg: "Surrender to them. You've earned this stillness." },
      ]
    }
  };

  function getPeriod(h) {
    if (h >= 5  && h < 12) return 'morning';
    if (h >= 12 && h < 17) return 'afternoon';
    if (h >= 17 && h < 21) return 'evening';
    return 'night';
  }

  let index = 0;
  let currentPeriod = getPeriod(new Date().getHours());

  function updateClock() {
    const now = new Date();
    const h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    document.getElementById('clock').textContent = `${h12}:${m} ${ampm}`;
    currentPeriod = getPeriod(h);
    document.getElementById('period-label').textContent = data[currentPeriod].label;
  }

  function showGreeting(idx) {
    const list = data[currentPeriod].greetings;
    const item = list[idx % list.length];
    const gEl = document.getElementById('greeting-text');
    const mEl = document.getElementById('message-text');
    gEl.classList.remove('fade');
    mEl.classList.remove('fade');
    void gEl.offsetWidth;
    gEl.classList.add('fade');
    mEl.classList.add('fade');
    gEl.textContent = item.text;
    mEl.textContent = item.msg;
  }

  document.getElementById('next-btn').addEventListener('click', () => {
    index++;
    showGreeting(index);
  });

  updateClock();
  showGreeting(index);
  setInterval(updateClock, 30000);
</script>
</body>
</html>
